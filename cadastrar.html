<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Cadastro de Usuário</h1>
  <form id="cadastroForm">
    <input type="text" id="nome" placeholder="Nome" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="password" id="senha" placeholder="Senha" required><br><br>
    <input type="text" id="cpf" placeholder="CPF" required maxlength="14"><br><br>
    <input type="text" id="rg" placeholder="RG" required maxlength="12"><br><br>

    <button type="submit">Cadastrar</button>
  </form>

  <p id="mensagem"></p>

  <script>
    // 🔹 Coloque aqui os dados do seu projeto Supabase
    const SUPABASE_URL = "https://zyyrmedbihwyxmhgudvz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5eXJtZWRiaWh3eXhtaGd1ZHZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU5ODYxMjgsImV4cCI6MjA3MTU2MjEyOH0.RZnBj4wjNbE3BsX15HW_hQZPncJp21Ns_3S29proWnA";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 🔹 Função para validar CPF
    function validarCPF(cpf) {
      cpf = cpf.replace(/\D/g, "");
      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

      let soma = 0, resto;
      for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf.substring(9, 10))) return false;

      soma = 0;
      for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf.substring(10, 11))) return false;

      return true;
    }

    // 🔹 Função para validar RG (7 a 9 dígitos)
    function validarRG(rg) {
      // Remove pontos, traços e espaços
      rg = rg.replace(/[^0-9Xx]/g, "").toUpperCase();

      // Deve ter de 8 a 9 caracteres
      if (rg.length < 8 || rg.length > 9) return false;

      // Não pode ser todos os dígitos iguais
      if (/^(\d)\1+$/.test(rg)) return false;

      // Aceita apenas dígitos e, opcionalmente, um X no final
      const regex = /^[0-9]{7,8}[0-9X]?$/;
      return regex.test(rg);
    }

    // 🔹 Máscara para CPF
    document.getElementById("cpf").addEventListener("input", function(e) {
      let value = e.target.value.replace(/\D/g, "");
      if (value.length > 11) value = value.slice(0, 11);
      value = value.replace(/(\d{3})(\d)/, "$1.$2");
      value = value.replace(/(\d{3})(\d)/, "$1.$2");
      value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
      e.target.value = value;
    });

    // 🔹 Máscara para RG
    document.getElementById("rg").addEventListener("input", function(e) {
      let value = e.target.value.replace(/\D/g, "");
      if (value.length > 9) value = value.slice(0, 9);
      value = value.replace(/(\d{2})(\d)/, "$1.$2");
      value = value.replace(/(\d{3})(\d)/, "$1.$2");
      value = value.replace(/(\d{3})(\d{1})$/, "$1-$2");
      e.target.value = value;
    });

    // Captura o evento do formulário
    document.getElementById("cadastroForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;
      const cpf = document.getElementById("cpf").value;
      const rg = document.getElementById("rg").value;

      // Limpar para validação
      const cpfLimpo = cpf.replace(/\D/g, "");
      const rgLimpo = rg.replace(/[^0-9Xx]/g, "").toUpperCase();

       // 🔹 Validações antes de cadastrar
      if (!validarCPF(cpf)) {
        document.getElementById("mensagem").innerText = "❌ CPF inválido!";
        return;
      }
      if (!validarRG(rg)) {
        document.getElementById("mensagem").innerText = "❌ RG inválido!";
        return;
      }

      // 1️⃣ Cria o usuário no Auth (hash automático)
      const { data: authData, error: authError } = await supabase.auth.signUp({
        email: email,
        password: senha
      });

      if (authError) {
        document.getElementById("mensagem").innerText = "❌ Erro: " + authError.message;
        return;
      }

      const userId = authData.user.id;

      // 2️⃣ Salva no banco
      const { data, error } = await supabase
        .from("usuarios")
        .insert([{ user_id: userId, nome, cpf: cpfLimpo, rg: rgLimpo }]);

      if (error) {
        if (error.code === "23505") { // Código do Postgres para unique_violation
          if (error.message.includes("usuarios_cpf_key")) {
            document.getElementById("mensagem").innerText = ("❌ Esse CPF já está cadastrado.");
            return;
            
          }
          if (error.message.includes("usuarios_rg_key")) {
            document.getElementById("mensagem").innerText = ("❌ Esse RG já está cadastrado.");
            return;
          }
        }
        // outros erros genéricos
        document.getElementById("mensagem").innerText = ("❌ Erro ao salvar usuário: " + error.message);
        return;
      }
      
      return "✅ Usuário cadastrado com sucesso!";
    
    });
  </script>
</body>
</html>
